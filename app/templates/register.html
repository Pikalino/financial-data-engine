<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>

    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/theme.js"></script>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-container">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Set up a new workspace login for Financial Data Engine.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/register" class="form-stack">
                <input type="text" name="username" placeholder="Username" required />
                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <button type="submit">Create account</button>
            </form>

            <p class="small-note" style="margin-bottom: 0;">
                Already have an account? <a href="/login">Login</a>
            </p>

            <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
                <button type="button" class="secondary theme-toggle" onclick="toggleTheme()" style="width: auto;">
                    Toggle Theme
                </button>
            </div>
        </div>
    </div>
</body>
</html>
